plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'
}

// locate react-native and CLI gradle scripts from a few likely locations
def locateDir = { List candidates ->
    for (c in candidates) {
        if (c != null && c.exists()) {
            return c
        }
    }
    return null
}

def reactCandidates = [
        file('../../node_modules/react-native'),
        file('../node_modules/react-native'),
        file('../../../node_modules/react-native'),
        file('../../../../node_modules/react-native'),
        rootProject.file('node_modules/react-native'),
        rootProject.file('../node_modules/react-native')
]

def cliCandidates = [
        file('../../node_modules/@react-native-community/cli-platform-android'),
        file('../node_modules/@react-native-community/cli-platform-android'),
        rootProject.file('node_modules/@react-native-community/cli-platform-android'),
]

def reactNativeDir = locateDir(reactCandidates)
def cliAndroidDir = locateDir(cliCandidates)

project.ext.react = [
        entryFile     : file('../../index.js'),
        enableHermes   : true,
        bundleInDebug  : false,
        bundleInRelease: true
]

if (reactNativeDir != null) {
    def reactGradle = file("${reactNativeDir}/react.gradle")
    if (reactGradle.exists()) {
        apply from: reactGradle
    }
}

if (cliAndroidDir != null) {
    def cliGradle = file("${cliAndroidDir}/native_modules.gradle")
    if (cliGradle.exists()) {
        apply from: cliGradle
    }
}

def enableProguardInReleaseBuilds = false
def hermesEnabled = project.hasProperty('hermesEnabled') ? project.hermesEnabled.toBoolean() : true
def jscFlavor = 'org.webkit:android-jsc:+'

android {
    namespace 'com.streamapp.mobile'
    def _compileSdk = 34
    try {
        if (rootProject != null && rootProject.ext != null && rootProject.ext.compileSdkVersion != null) {
            _compileSdk = rootProject.ext.compileSdkVersion
        }
    } catch (ignored) {}
    compileSdk _compileSdk

    defaultConfig {
        applicationId 'com.streamapp.mobile'
        minSdk rootProject.ext.minSdkVersion
        targetSdk rootProject.ext.targetSdkVersion
        versionCode 1
        versionName '0.1.0'
        multiDexEnabled true
        vectorDrawables {
            useSupportLibrary true
        }
    }

    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }

        release {
            minifyEnabled enableProguardInReleaseBuilds
            shrinkResources enableProguardInReleaseBuilds
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
            signingConfig signingConfigs.debug
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    packagingOptions {
        resources {
            excludes += ['META-INF/*']
        }
    }
}

dependencies {
    implementation 'com.facebook.react:react-android'

    if (hermesEnabled) {
        implementation 'com.facebook.react:hermes-android'
    } else {
        implementation jscFlavor
    }
}