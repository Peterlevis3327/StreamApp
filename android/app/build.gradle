plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'
    id 'com.facebook.react'
}

react {
    entryFile = file('../../index.js')
    autolinkLibrariesWithApp()
}

def enableProguardInReleaseBuilds = false
def hermesEnabled = project.hasProperty('hermesEnabled') ? project.hermesEnabled.toBoolean() : true
def jscFlavor = 'org.webkit:android-jsc:+'

android {
    namespace 'com.streamapp.mobile'
    def _compileSdk = 35
    try {
        if (rootProject != null && rootProject.ext != null && rootProject.ext.compileSdkVersion != null) {
            _compileSdk = rootProject.ext.compileSdkVersion
        }
    } catch (ignored) {}
    compileSdk _compileSdk

    defaultConfig {
        applicationId 'com.streamapp.mobile'
        minSdk rootProject.ext.minSdkVersion
        targetSdk rootProject.ext.targetSdkVersion
        versionCode 1
        versionName '0.1.0'
        multiDexEnabled true
        vectorDrawables {
            useSupportLibrary true
        }
    }

    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }

        release {
            minifyEnabled enableProguardInReleaseBuilds
            shrinkResources enableProguardInReleaseBuilds
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
            signingConfig signingConfigs.debug
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    packagingOptions {
        resources {
            excludes += ['META-INF/*']
        }
    }
}

dependencies {
    def reactNativeVersion = '0.76.0'
    try {
        if (rootProject != null && rootProject.ext != null && rootProject.ext.reactNativeVersion != null) {
            reactNativeVersion = rootProject.ext.reactNativeVersion
        }
    } catch (ignored) {}

    implementation "com.facebook.react:react-android:${reactNativeVersion}"

    if (hermesEnabled) {
        implementation "com.facebook.react:hermes-android:${reactNativeVersion}"
    } else {
        implementation jscFlavor
    }
}
