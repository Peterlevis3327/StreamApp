plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'
}

def reactNativeDir = file('../../node_modules/react-native')
def cliAndroidDir = file('../../node_modules/@react-native-community/cli-platform-android')

project.ext.react = [
        entryFile     : file('../../index.js'),
        enableHermes   : true,
        bundleInDebug  : false,
        bundleInRelease: true
]

if (reactNativeDir.exists()) {
    apply from: file('../../node_modules/react-native/react.gradle')
}

if (cliAndroidDir.exists()) {
    apply from: file('../../node_modules/@react-native-community/cli-platform-android/native_modules.gradle')
}

def enableProguardInReleaseBuilds = false
def hermesEnabled = project.hasProperty('hermesEnabled') ? project.hermesEnabled.toBoolean() : true
def jscFlavor = 'org.webkit:android-jsc:+'

android {
    namespace 'com.streamapp.mobile'
    compileSdk rootProject.ext.compileSdkVersion

    defaultConfig {
        applicationId 'com.streamapp.mobile'
        minSdk rootProject.ext.minSdkVersion
        targetSdk rootProject.ext.targetSdkVersion
        versionCode 1
        versionName '0.1.0'
        multiDexEnabled true
        vectorDrawables {
            useSupportLibrary true
        }
    }

    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }

        release {
            minifyEnabled enableProguardInReleaseBuilds
            shrinkResources enableProguardInReleaseBuilds
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
            signingConfig signingConfigs.debug
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    packagingOptions {
        resources {
            excludes += ['META-INF/*']
        }
    }
}

dependencies {
    implementation 'com.facebook.react:react-android'

    if (hermesEnabled) {
        implementation 'com.facebook.react:hermes-android'
    } else {
        implementation jscFlavor
    }
}