pluginManagement {
    includeBuild("../node_modules/@react-native/gradle-plugin")
}

plugins {
    id("com.facebook.react.settings")
}

reactSettings {
    def cliPath = new File(settingsDir, "../node_modules/@react-native-community/cli/build/bin.js")
    def autolinkCommand = cliPath.exists()
        ? ["node", cliPath.absolutePath, "config"]
        : ["npx", "@react-native-community/cli", "config"]
    autolinkLibrariesFromCommand(autolinkCommand, new File(settingsDir, ".."))
}

dependencyResolutionManagement {
    repositoriesMode.set(RepositoriesMode.PREFER_PROJECT)
    repositories {
        google()
        mavenCentral()
    }
}

rootProject.name = 'StreamApp'
include(':app')

def ensureAndroidProjectDir = { String projectPath, String relativeDir ->
    def projectRef = findProject(projectPath)
    if (projectRef == null) {
        include(projectPath)
        projectRef = findProject(projectPath)
    }
    projectRef.projectDir = new File(settingsDir, relativeDir)
}

// Ensure common RN libraries resolve to their Android build files in CI.
ensureAndroidProjectDir(':react-native-video', '../node_modules/react-native-video/android')
ensureAndroidProjectDir(':react-native-async-storage_async-storage', '../node_modules/@react-native-async-storage/async-storage/android')
ensureAndroidProjectDir(':react-native-safe-area-context', '../node_modules/react-native-safe-area-context/android')
